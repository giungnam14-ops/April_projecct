<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shorts 생성기 - AI 프리미엄 렌더링 v2</title>
    <meta name="description" content="AI 기술로 실사 영상을 활용한 유튜브 쇼츠 제작">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 크롬 렌더링 최적화를 위한 비가시 비디오 스타일 */
        #bg-video {
            position: fixed;
            top: -10000px;
            left: -10000px;
            width: 160px;
            height: 90px;
            opacity: 0.01;
            pointer-events: none;
            z-index: -9999;
        }

        /* 50% 정체 시 클릭 유도 가이드 */
        #interaction-guide {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(34, 211, 238, 0.9);
            color: #000;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 10px 40px rgba(34, 211, 238, 0.4);
            cursor: pointer;
            z-index: 1000;
            animation: pulse-guide 1.5s infinite;
        }

        @keyframes pulse-guide {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <nav>
        <div class="logo">shorts 생성기</div>
    </nav>

    <main>
        <section class="hero animate">
            <h1>단 한 번의 클릭으로,<br>완성된 쇼츠를.</h1>
            <p>기획부터 실사 영상 선별, 자막 합성 및 인코딩까지 AI가 한 번에 처리합니다.</p>
            
            <div class="cta-group">
                <div class="options-group" style="margin-bottom: 0.8rem;">
                    <label class="option-item"><input type="radio" name="video-option" value="subtitle" checked> 자막 전용</label>
                    <label class="option-item"><input type="radio" name="video-option" value="voice"> 나레이션 포함</label>
                </div>
                <div class="options-group">
                    <span style="font-size: 0.85rem; color: var(--text-dim); margin-right: 10px;">영상 길이:</span>
                    <label class="option-item"><input type="radio" name="video-duration" value="15" checked> 15초</label>
                    <label class="option-item"><input type="radio" name="video-duration" value="30"> 30초</label>
                    <label class="option-item"><input type="radio" name="video-duration" value="60"> 60초</label>
                </div>
                <p id="eta-text" class="duration-info">예상 총 소요 시간: 약 25초</p>

                <input type="text" id="subject-input" class="input-field" placeholder="주제를 입력하세요 (예: 화려한 서울의 낮과 밤, 평화로운 해변)">
                <button class="btn-primary" id="generate-btn">쇼츠 자동 생성 시작</button>
            </div>

            <div class="demo-window animate" id="render-display">
                <div class="input-mock" id="display-input">> AI 자동 렌더링 엔진 대기 중...</div>
                
                <div id="loading-overlay" class="status-bars" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
                    <div class="bar-container" style="width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden;">
                        <div id="pb-1" class="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(to right, #22d3ee, #818cf8); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #22d3ee; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
                        <span id="progress-status">시스템 대기</span>
                        <span id="progress-percent">0%</span>
                    </div>
                </div>

                <div id="interaction-guide">제작 시작을 위해 화면을 클릭해 주세요!</div>

                <div id="timer-ui" class="timer-container hidden" style="background: rgba(34, 211, 238, 0.1); border-color: #22d3ee; margin-top: 20px;">
                    <span class="timer-label" style="color: #22d3ee;">AI가 영상을 굽는 중</span>
                    <span id="timer-display" style="font-size: 1.5rem; font-family: monospace;">00:00</span>
                </div>
                
                <p id="status-text" style="font-size: 0.85rem; color: var(--text-dim); margin-top: 15px; line-height: 1.6;">주제를 입력하고 버튼을 누르면 모든 공정이 자동으로 시작됩니다.</p>
                
                <div id="workspace" class="workspace hidden">
                    <div class="video-container" style="position: relative;">
                        <!-- 자막이 합성되는 실제 캔버스 -->
                        <canvas id="video-canvas" width="360" height="640" style="border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);"></canvas>
                        
                        <!-- 완성된 결과물을 재생할 실제 비디오 플레이어 (렌더링 완료 후 표시됨) -->
                        <video id="final-result-video" width="360" height="640" controls playsinline style="border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; object-fit: cover;"></video>
                        
                        <!-- 소스 비디오 -->
                        <video id="bg-video" loop muted playsinline crossorigin="anonymous"></video>
                        <div id="success-badge" style="position: absolute; top: 20px; right: 20px; background: #22d3ee; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 0.7rem; display:none;">COMPLETED</div>
                    </div>
                    <div class="editor-panel">
                        <label class="editor-label">✨ 생성된 프리미엄 쇼츠</label>
                        <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px;">AI가 제작한 최종 결과물입니다. 영상을 재생해 보거나, 아래 버튼을 눌러 소장하세요.</p>
                        <div class="action-btns">
                            <button class="btn-primary" id="final-download-btn" style="width: 100%; height: 50px;">💾 영상 즉시 다운로드</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <script>
        const generateBtn = document.getElementById('generate-btn');
        const subjectInput = document.getElementById('subject-input');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const bgVideo = document.getElementById('bg-video');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('pb-1');
        const progressPercent = document.getElementById('progress-percent');
        const progressStatus = document.getElementById('progress-status');
        const workspace = document.getElementById('workspace');
        const timerUI = document.getElementById('timer-ui');
        const timerDisplay = document.getElementById('timer-display');
        const finalDownloadBtn = document.getElementById('final-download-btn');
        const interactionGuide = document.getElementById('interaction-guide');

        let currentScript = [];
        let selectedDuration = 15;
        let recordedBlob = null;
        let isRendering = false;
        let renderStartTime = 0;
        let timerInterval = null;

        // 분량 선택 연동
        document.querySelectorAll('input[name="video-duration"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                selectedDuration = parseInt(e.target.value);
                const totalEta = selectedDuration + 10;
                document.getElementById('eta-text').innerText = `예상 총 소요 시간: 약 ${totalEta}초`;
            });
        });

        function updateProgress(percent, status) {
            progressBar.style.width = `${percent}%`;
            progressPercent.innerText = `${percent}%`;
            if (status) progressStatus.innerText = status;
        }

        async function fetchVideoUrl(query) {
            updateProgress(15, "주제 기획 및 최적화");
            statusText.innerText = "사용자의 주제를 분석하여 최상의 실사 장면을 기획하고 있습니다.";
            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&orientation=portrait&per_page=1`, {
                    headers: { 'Authorization': '5330a42d-8012-4fb5-90d3-30691775f0a4' }
                });
                const data = await res.json();
                if (data.videos && data.videos.length > 0) {
                    const videoFile = data.videos[0].video_files.find(f => f.width >= 720) || data.videos[0].video_files[0];
                    return videoFile.link;
                }
            } catch (e) { console.error("Search failed:", e); }
            return "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";
        }

        function drawFrame() {
            // 항상 기본 배경을 먼저 그립니다 (비디오가 없거나 페치 실패 시 대비)
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0f172a');
            gradient.addColorStop(1, '#334155');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 비디오가 정상적으로 로드되어 재생 중일 때만 합성 적용
            if (bgVideo.readyState >= 2 && !bgVideo.paused && !bgVideo.ended && bgVideo.videoWidth > 0) {
                try {
                    const vRatio = bgVideo.videoWidth / bgVideo.videoHeight;
                    const cRatio = canvas.width / canvas.height;
                    let sx, sy, sw, sh;
                    if (vRatio > cRatio) {
                        sh = bgVideo.videoHeight;
                        sw = sh * cRatio;
                        sx = (bgVideo.videoWidth - sw) / 2;
                        sy = 0;
                    } else {
                        sw = bgVideo.videoWidth;
                        sh = sw / cRatio;
                        sx = 0;
                        sy = (bgVideo.videoHeight - sh) / 2;
                    }
                    ctx.drawImage(bgVideo, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
                } catch(e) {
                    console.warn("비디오 프레임 추출 중 에러 무시", e);
                }
            }

            // 가독성 오버레이 (영상이 너무 밝을 경우를 대비)
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 자막 렌더링 - 유튜브 쇼츠 전문 스타일 (둥근 배경 박스)
            if (currentScript.length > 0) {
                const timePerLine = (selectedDuration * 1000) / currentScript.length;
                const elapsed = (Date.now() - renderStartTime);
                const activeIndex = Math.floor(elapsed / timePerLine) % currentScript.length;
                const text = currentScript[activeIndex] || "";
                
                ctx.font = "bold 26px 'Pretendard', 'Noto Sans KR', sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                // 박스 그리기
                const textWidth = ctx.measureText(text).width;
                const boxPaddingX = 25;
                const boxPaddingY = 15;
                const boxX = (canvas.width / 2) - (textWidth / 2) - boxPaddingX;
                const boxY = (canvas.height / 2) + 150 - boxPaddingY;
                const boxWidth = textWidth + (boxPaddingX * 2);
                const boxHeight = 26 + (boxPaddingY * 2);

                ctx.fillStyle = "rgba(0, 0, 0, 0.70)"; // 진한 반투명 블랙
                if (ctx.roundRect) {
                    ctx.beginPath();
                    ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 15);
                    ctx.fill();
                } else {
                    ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                }

                // 글씨 그리기
                ctx.fillStyle = "#ffffff";
                ctx.shadowBlur = 0; // 박스가 있으므로 그림자 제거
                ctx.fillText(text, canvas.width/2, canvas.height/2 + 150 + 13);
            }
            
            if (isRendering) requestAnimationFrame(drawFrame);
        }

        function checkFrameValidity() {
            try {
                if (bgVideo.readyState < 2) return false;
                ctx.drawImage(bgVideo, 0, 0, 10, 10);
                const data = ctx.getImageData(0, 0, 10, 10).data;
                let hasColor = false;
                for(let i=0; i<data.length; i+=4) {
                    if(data[i] > 5 || data[i+1] > 5 || data[i+2] > 5) {
                        hasColor = true; break;
                    }
                }
                return hasColor;
            } catch(e) {
                return false;
            }
        }

        async function startIntegratedProcess() {
            const query = subjectInput.value.trim();
            if (!query) return alert("주제를 입력해 주세요!");

            clearInterval(timerInterval);
            isRendering = false;
            generateBtn.disabled = true;
            generateBtn.innerText = "제작 엔진 가동 중...";
            workspace.classList.add('hidden');
            timerUI.classList.add('hidden');
            
            // 캔버스를 다시 보여주고 결과 비디오를 숨김 (초기화)
            canvas.style.display = 'block';
            document.getElementById('final-result-video').style.display = 'none';

            document.getElementById('display-input').innerText = `> 주제: [${query}] 확보 중...`;

            // 1. 소스 확보
            const rawUrl = await fetchVideoUrl(query);
            
            updateProgress(50, "CORS 보안 채널 연결 중");
            statusText.innerText = `사용자님이 원하시는 '${query}' 실사 비디오를 글로벌 프록시망을 통해 불러오고 있습니다.`;
            
            // 글로벌 프록시망(corsproxy.io)을 상시 우회 경로로 사용. 실사 영상을 무조건 불러옵니다.
            bgVideo.src = `https://corsproxy.io/?url=${encodeURIComponent(rawUrl)}`;
            bgVideo.load();

            // 3. 지능형 실행 루프 및 타임아웃
            let waitTime = 0;
            const checkReady = new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    waitTime += 200;
                    
                    // 재생(play) 실패 시 에러 무시
                    bgVideo.play().catch(e => {});

                    try {
                        let isValid = checkFrameValidity();
                        if (bgVideo.error) {
                            statusText.innerText = "⚠️ 비디오 로드 오류가 발생했습니다. 대체 소스로 진행합니다.";
                        }
                        
                        // 8초 지나면 강제 시작 (고화질 로딩 딜레이 고려)
                        if (isValid || waitTime > 8000) {
                            clearInterval(checkInterval);
                            interactionGuide.style.display = 'none';
                            resolve();
                        } else if (waitTime > 3000) {
                            interactionGuide.style.display = 'block'; // 정체가 길어지면 클릭 유도
                        }
                    } catch(e) {
                        if (waitTime > 8000) {
                            clearInterval(checkInterval);
                            interactionGuide.style.display = 'none';
                            resolve();
                        }
                    }
                }, 200);
            });

            interactionGuide.onclick = () => {
                bgVideo.play().catch(e=>{});
                interactionGuide.style.display = 'none';
            };

            await checkReady;
            beginRecording(query);
        }

        function beginRecording(query) {
            isRendering = true;
            renderStartTime = Date.now();
            
            // 주제어(query) 기반 동적 지능형 대본 생성
            currentScript = [
                `누구나 궁금해 하던 바로 그 '${query}'`,
                `그 이면에 숨겨진 놀라운 비밀`,
                `'${query}'이(가) 우리의 일상을 어떻게 바꿀까요?`,
                `지금 바로 이 특별한 영상을 통해 확인하세요.`,
                `구독과 좋아요 누르고 더 많은 정보 받아가세요!`
            ];

            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { 
                mimeType: 'video/webm; codecs=vp9',
                videoBitsPerSecond: 6000000 
            });
            
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                recordedBlob = new Blob(chunks, { type: 'video/webm' });
                finalizeProduction(query);
            };

            // 타이머 UI 활성화 및 동기화
            timerUI.classList.remove('hidden');
            let timeLeft = selectedDuration;
            updateProgress(80, "영상을 굽는 중");
            statusText.innerText = `AI가 텍스트와 '${query}' 실사 비디오를 정성껏 조립하고 있습니다. 탭을 닫지 마세요.`;

            timerInterval = setInterval(() => {
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${m}:${s}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    recorder.stop();
                }
                timeLeft -= 1;
            }, 1000);

            recorder.start();
            drawFrame();
        }

        function finalizeProduction(query) {
            isRendering = false; // 더 이상 캔버스를 그리지 않음
            timerUI.classList.add('hidden');
            updateProgress(100, "제작 완료");
            statusText.innerText = `✨ 축하합니다! '${query}' 프리미엄 실사 쇼츠가 성공적으로 완성되었습니다. 아래 플레이어에서 비디오를 시청하세요.`;
            
            generateBtn.disabled = false;
            generateBtn.innerText = "새로운 프리미엄 쇼츠 만들기";
            workspace.classList.remove('hidden');
            document.getElementById('success-badge').style.display = 'block';

            const url = URL.createObjectURL(recordedBlob);
            
            // 캔버스를 즉시 삭제/숨기고, 브라우저 기본 컨트롤러가 있는 실제 <video> 만 노출
            canvas.style.display = 'none';
            const finalVideo = document.getElementById('final-result-video');
            finalVideo.src = url;
            finalVideo.style.display = 'block';
            
            // 자동 재생 시도 (소리 조절 등 네이티브 컨트롤 UI 등장)
            finalVideo.play().catch(e=>console.log("Autoplay blocked for final result"));

            finalDownloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = `${query}-ai-shorts-premium.webm`;
                a.click();
            };
        }

        generateBtn.addEventListener('click', startIntegratedProcess);
    </script>
</body>
</html>
