<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shorts 생성기 - 고퀄리티 AI 쇼츠 제작</title>
    <meta name="description" content="AI 기술로 실사 영상을 활용한 유튜브 쇼츠 제작">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <nav>
        <div class="logo">shorts 생성기</div>
    </nav>

    <main>
        <section class="hero animate">
            <h1>상상을 실사 쇼츠로,<br>단 1분 만에.</h1>
            <p>단순한 이미지가 아닙니다. 주제와 완벽하게 매칭되는 고화질 실사 영상을 AI가 직접 선별하여 합성합니다.</p>
            
            <div class="cta-group">
                <div class="options-group" style="margin-bottom: 0.5rem;">
                    <label class="option-item"><input type="radio" name="video-option" value="subtitle" checked> 자막 전용</label>
                    <label class="option-item"><input type="radio" name="video-option" value="voice"> 나레이션 포함</label>
                </div>
                
                <!-- 제작 분량 선택 추가 -->
                <div class="options-group">
                    <span style="font-size: 0.85rem; color: var(--text-dim); margin-right: 10px;">제작 분량:</span>
                    <label class="option-item"><input type="radio" name="video-duration" value="60" checked> 1분</label>
                    <label class="option-item"><input type="radio" name="video-duration" value="180"> 3분</label>
                    <label class="option-item"><input type="radio" name="video-duration" value="300"> 5분</label>
                </div>
                <p id="eta-text" class="duration-info">예상 제작 소요 시간: 약 1분 10초</p>

                <input type="text" id="subject-input" class="input-field" placeholder="주제를 입력하세요 (예: 심해의 미스테리, 화려한 뉴욕 밤거리)">
                <button class="btn-primary" id="generate-btn">고퀄리티 영상 생성하기</button>
            </div>

            <div class="demo-window animate" style="animation-delay: 0.2s;">
                <div class="input-mock" id="display-input">> 생성 대기 중...</div>
                <div class="status-bars" style="display: flex; flex-direction: column; gap: 8px; margin-top: 20px;">
                    <div class="bar-container" style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                        <div id="pb-1" class="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(to right, var(--primary-color), var(--accent-color)); transition: width 0.3s ease;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--accent-color); font-weight: 600;">
                        <span id="progress-status">대기 중</span>
                        <span id="progress-percent">0%</span>
                    </div>
                </div>
                <div id="timer-ui" class="timer-container hidden">
                    <span class="timer-label">자동 렌더링 중</span>
                    <span id="timer-display">00:00</span>
                </div>
                <p id="status-text" style="font-size: 0.85rem; color: var(--text-dim); margin-top: 10px; line-height: 1.4;">주제를 입력하시면 AI 기획 엔진이 비주얼 설계를 시작합니다.</p>
                
                <div id="workspace" class="workspace hidden">
                    <div class="video-container">
                        <canvas id="video-canvas" width="360" height="640"></canvas>
                        <video id="bg-video" loop muted playsinline crossorigin="anonymous" style="display:none;"></video>
                    </div>
                    <div class="editor-panel">
                        <label class="editor-label">📜 AI 대본 편집 및 렌더링</label>
                        <textarea id="edit-script-area"></textarea>
                        <div class="action-btns">
                            <button class="btn-secondary" id="apply-btn">대본 적용</button>
                            <button class="btn-primary" id="download-btn">영상 다운로드</button>
                        </div>
                        <p style="font-size: 0.75rem; color: var(--text-dim); margin-top: 10px;">* 다운로드 버튼을 누르면 실시간 렌더링이 시작됩니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const subjectInput = document.getElementById('subject-input');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const bgVideo = document.getElementById('bg-video');
        const scriptArea = document.getElementById('edit-script-area');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('pb-1');
        const progressPercent = document.getElementById('progress-percent');
        const progressStatus = document.getElementById('progress-status');
        const workspace = document.getElementById('workspace');
        const etaText = document.getElementById('eta-text');
        const timerUI = document.getElementById('timer-ui');
        const timerDisplay = document.getElementById('timer-display');

        let currentText = "";
        let isGenerating = false;
        let selectedDuration = 60;

        // 분량 선택 시 예상 시간 업데이트
        document.querySelectorAll('input[name="video-duration"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                selectedDuration = parseInt(e.target.value);
                const minutes = Math.floor((selectedDuration + 10) / 60);
                const seconds = (selectedDuration + 10) % 60;
                etaText.innerText = `예상 제작 소요 시간: 약 ${minutes > 0 ? minutes + '분 ' : ''}${seconds}초`;
            });
        });

        function updateProgress(percent, status) {
            progressBar.style.width = `${percent}%`;
            progressPercent.innerText = `${percent}%`;
            if (status) progressStatus.innerText = status;
        }

        function startTimer(duration) {
            timerUI.classList.remove('hidden');
            let timeLeft = duration;
            
            const timerInterval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerUI.classList.add('hidden');
                }
                timeLeft--;
            }, 1000);
            return timerInterval;
        }

        async function fetchVideo(query) {
            updateProgress(20, "주제 기획 및 분석 중...");
            statusText.innerText = "AI가 주제의 핵심 의미를 기획하고 있으며, 최적의 연출 방식을 결정 중입니다.";
            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&orientation=portrait&per_page=1`, {
                    headers: { 'Authorization': '5330a42d-8012-4fb5-90d3-30691775f0a4' }
                });
                const data = await res.json();
                
                updateProgress(50, "비주얼 소딩 설계 중...");
                statusText.innerText = "데이터베이스에서 기획 의도에 가장 완벽히 부합하는 실사 소스를 설계 중입니다.";
                
                if (data.videos && data.videos.length > 0) {
                    const videoFile = data.videos[0].video_files.find(f => f.width >= 720) || data.videos[0].video_files[0];
                    return videoFile.link;
                }
            } catch (e) { console.error(e); }
            return "https://joy1.videvo.net/videvo_files/video/free/2014-12/large_watermarked/Raindrops_v_preview.mp4";
        }

        function renderLoop() {
            if (!bgVideo.paused && !bgVideo.ended) {
                const vRatio = bgVideo.videoWidth / bgVideo.videoHeight;
                const cRatio = canvas.width / canvas.height;
                let sx, sy, sw, sh;
                if (vRatio > cRatio) {
                    sh = bgVideo.videoHeight;
                    sw = sh * cRatio;
                    sx = (bgVideo.videoWidth - sw) / 2;
                    sy = 0;
                } else {
                    sw = bgVideo.videoWidth;
                    sh = sw / cRatio;
                    sx = 0;
                    sy = (bgVideo.videoHeight - sh) / 2;
                }
                ctx.drawImage(bgVideo, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 24px Outfit";
                ctx.textAlign = "center";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                const lines = currentText.split('\n').filter(l => l.trim() !== '');
                const time = Date.now() / 2500;
                const activeIndex = Math.floor(time % lines.length);
                const activeLine = lines[activeIndex] || "";
                ctx.fillText(activeLine, canvas.width/2, canvas.height/2 + 100);
            }
            requestAnimationFrame(renderLoop);
        }

        generateBtn.addEventListener('click', async () => {
            const query = subjectInput.value.trim();
            if (!query) return alert("주제를 입력해 주세요!");
            
            workspace.classList.add('hidden');
            generateBtn.disabled = true;
            generateBtn.innerText = "기획 엔진 가동 중...";
            
            const videoUrl = await fetchVideo(query);
            
            let currentLoadPercent = 75;
            updateProgress(currentLoadPercent, "고화질 데이터 전송 중...");
            statusText.innerText = "품질 유지를 위해 고퀄리티 비주얼 데이터를 안전하게 전송받고 있습니다. 화면을 유지해 주세요.";

            // 로딩 무한 대기 방지 (타임아웃 15초)
            let isVideoReady = false;
            const loadTimeout = setTimeout(() => {
                if (!isVideoReady) {
                    console.log("Video timeout - proceeding with fallback");
                    proceedToCompletion();
                }
            }, 15000);

            const loadingInterval = setInterval(() => {
                if (currentLoadPercent < 98) {
                    currentLoadPercent += 1;
                    updateProgress(currentLoadPercent, "스트리밍 중...");
                }
            }, 600);
            
            bgVideo.src = videoUrl;
            bgVideo.setAttribute('crossorigin', 'anonymous');
            bgVideo.load();

            function proceedToCompletion() {
                isVideoReady = true;
                clearTimeout(loadTimeout);
                clearInterval(loadingInterval);
                updateProgress(100, "쇼츠 생성 완료");
                statusText.innerText = "✨ AI 기반 프리미엄 실사 쇼츠 영상이 성공적으로 제작되었습니다!";
                generateBtn.disabled = false;
                generateBtn.innerText = "고퀄리티 영상 생성하기";
                workspace.classList.remove('hidden');
                
                const defaultScript = `[${query}] 주제의 프리미엄 쇼츠입니다.\n실제로 움직이는 고퀄리티 화면을 보세요.\n아이디어가 현실이 되는 순간,\n당신만의 쇼츠를 완성해 보세요!`;
                scriptArea.value = defaultScript;
                currentText = defaultScript;
                
                bgVideo.play().catch(e => console.log("Auto-play blocked, waiting for interaction"));
                renderLoop();
            }
            
            bgVideo.oncanplay = () => {
                if (!isVideoReady) proceedToCompletion();
            };
            
            // 이미 readyState가 충분한 경우 즉시 진행
            if (bgVideo.readyState >= 3 && !isVideoReady) proceedToCompletion();
        });

        document.getElementById('apply-btn').addEventListener('click', () => {
            currentText = scriptArea.value;
            alert("대본이 실시간 반영되었습니다!");
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            if (isGenerating && generateBtn.disabled) return;

            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { 
                mimeType: 'video/webm; codecs=vp9',
                videoBitsPerSecond: 5000000 // 5Mbps 고화질
            });
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ai-shorts-premium.webm`;
                a.click();
                statusText.innerText = "✨ 영상 제작이 완료되어 다운로드되었습니다.";
            };

            recorder.start();
            document.getElementById('download-btn').disabled = true;
            document.getElementById('download-btn').innerText = "인코딩 중...";
            statusText.innerText = "영상을 실제 파일로 변환 중입니다. 탭을 닫지 마세요.";
            
            // 타이머 시작
            startTimer(selectedDuration);
            
            setTimeout(() => {
                recorder.stop();
                document.getElementById('download-btn').disabled = false;
                document.getElementById('download-btn').innerText = "영상 다운로드";
            }, selectedDuration * 1000);
        });
    </script>
</body>
</html>
